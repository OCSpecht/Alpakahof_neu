<!DOCTYPE html>
<html lang="de">
<head>

  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/images/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <link rel="stylesheet" href="/fonts/fonts.css">
  <style>
    :root {
      --green: #2D5016; --green-light: #4a7a28; --brown: #8B4513;
      --cream: #FAF7F2; --beige: #E8DDD0; --text: #2C2C2C;
      --text-light: #6B6B6B; --white: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Lato', sans-serif; color: var(--text); background: var(--cream); font-size: 16px; line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: rgba(250,247,242,0.97); border-bottom: 1px solid var(--beige); padding: 0 2rem; height: 72px; display: flex; align-items: center; }
    .nav-logo img { height: 60px; width: auto; }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 2rem; }
    .box { text-align: center; max-width: 560px; }
    .code { font-family: 'Playfair Display', serif; font-size: clamp(5rem, 14vw, 9rem); font-weight: 700; color: var(--beige); line-height: 1; }
    .lama { font-size: 3rem; margin: -1.5rem 0 0.5rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 4vw, 2.2rem); color: var(--green); margin-bottom: 1rem; }
    p { color: var(--text-light); margin-bottom: 2rem; }
    .btn { display: inline-block; padding: 0.85rem 2.2rem; border-radius: 4px; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none; background: var(--green); color: var(--white); transition: background 0.2s, transform 0.2s; }
    .btn:hover { background: var(--green-light); transform: translateY(-1px); }
    .links { margin-top: 1.8rem; font-size: 0.9rem; }
    .links a { color: var(--green); font-weight: 700; text-decoration: none; margin: 0 0.8rem; }
    .links a:hover { text-decoration: underline; }

    footer { background: #1a2e0a; color: rgba(255,255,255,0.55); text-align: center; padding: 2rem; font-size: 0.85rem; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo"><img src="/images/logo.png" alt="Rancho Cascada"></a>
</nav>

<main>
  <div class="box">
    <div class="code">404</div>
    <div class="lama">&#129433;</div>
    <h1>Diese Seite ist wohl davongaloppiert&hellip;</h1>

    <a href="/" class="btn">Zur Startseite</a>
    <div class="links">
      <a href="/geschichte.html">Geschichte</a>

  </div>

<footer>&copy; 2026 Rancho Cascada &ndash; Alpakahof</footer>
